<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Photography | Andrea Adelfio</title>
    <link rel="stylesheet" href="assets/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/andreaadelfio/inat-widget@main/inat-widget-custom.css" id="inat-widget-custom-stylesheet">
  </head>
  <body>
    <div id="page-spinner" class="page-spinner">
      <div class="spinner-content">
        <div class="spinner"></div>
      </div>
    </div>

    <div id="site-header"></div>

    <main class="wrap container photography-page">
      <section class="pub-variant">
        <h1>My Photo Collection</h1>
        <p class="lead">
          A selection of wildlife and nature photos.
        </p>
        <h2>iNaturalist Feed</h2>
        <p class="lead">
          Check also my iNaturalist profile!
        </p>
        <div
          data-inat-widget
          data-inat-source="andreaadelfio"
          data-inat-source-type="user"
          data-inat-theme="light"
          data-inat-layout="grid"
          data-inat-limit="12"
          data-inat-order-by="observed_on"
          data-inat-order="desc"
          data-inat-title="View my observations on"
          data-inat-show-title="true"
          data-inat-radius="14"
          data-inat-photo-size="square"
          data-inat-padding="14">
        </div>
      </section>

      <section class="pub-variant">
        <h2>Gallery by Tag</h2>
        <div id="photo-gallery" class="photo-tag-sections" aria-live="polite"></div>
      </section>
    </main>

    <div id="site-footer"></div>
    <script src="assets/include.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/andreaadelfio/inat-widget@main/inat-widget-custom.js"></script>
    <script src="assets/photography.js"></script>
  </body>
</html>
