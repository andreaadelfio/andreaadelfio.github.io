<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Photography | Andrea Adelfio</title>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <div id="page-spinner" class="page-spinner">
      <div class="spinner-content">
        <div class="spinner"></div>
      </div>
    </div>

    <div id="site-header"></div>

    <main class="wrap container photography-page">
      <header class="home-identity" aria-label="Site introduction">
        <h1>Photography</h1>
        <p class="lead">
          A selection of wildlife and nature photos.
        </p>
      </header>
      <section class="pub-variant">
        <h2>iNaturalist Feed</h2>
        <p class="lead">
          Take a look at my observations on iNaturalist!
        </p>

        <div
          data-inat-widget
          data-inat-title="View my observations on"
          data-inat-limit="15"
          data-inat-tile-size="xs"
          data-inat-cols-mode="fixed"
          data-inat-cols="5"
          data-inat-rows-mode="auto"
          data-inat-source="andreaadelfio"
          data-inat-show-stats="true">
        </div>

      </section>

      <section class="pub-variant">
        <h2>Gallery by Tag</h2>
        <div id="photo-gallery" class="photo-tag-sections" aria-live="polite"></div>
      </section>
    </main>

    <div id="site-footer"></div>
    <script src="assets/include.js"></script>
    <script src="https://andreaadelfio.github.io/inat-widget/inat-widget-custom.js"></script>
    <script src="assets/photography.js"></script>
  </body>
</html>
