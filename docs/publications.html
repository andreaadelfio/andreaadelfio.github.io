<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Publications | Andrea Adelfio</title>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <div id="page-spinner" class="page-spinner">
      <div class="spinner-content">
        <div class="spinner"></div>
      </div>
    </div>

    <div id="site-header"></div>

    <main class="wrap container publications-showcase-page">
      <header class="home-identity" aria-label="Site introduction">
        <h1>Publications</h1>
      </header>

      <section class="pub-variant">
        <h2>Selected Publications</h2>
        <div class="table-wrap pub-table-wrap-compact">
          <table class="pub-table pub-table-compact" id="publications-list">
            <thead>
              <tr>
                <th>Date</th>
                <th>Paper</th>
                <th>Link</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>
    <script src="assets/include.js"></script>
    <script src="assets/publications.js"></script>
  </body>
</html>
